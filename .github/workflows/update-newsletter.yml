name: Update newsletter from Substack

on:
  schedule:
    # 12:00 UTC daily (5am PT / 8am ET).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate article rows
        run: node scripts/update-newsletter.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- newsletter/index.html; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add newsletter/index.html
          git commit -m "newsletter: refresh article list from Substack [skip ci]"
          git push
