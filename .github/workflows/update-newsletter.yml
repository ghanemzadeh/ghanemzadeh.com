name: Update newsletter from Substack

on:
  schedule:
    # 12:00 UTC daily (5am PT / 8am ET).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Regenerate article rows
        run: node scripts/update-newsletter.mjs
        env:
          # Cloudflare Worker proxy used when Substack blocks the runner's
          # datacenter IP. See workers/substack-proxy/README.md.
          NEWSLETTER_PROXY_URL: ${{ vars.NEWSLETTER_PROXY_URL }}

      - name: Regenerate sitemap
        run: node scripts/update-sitemap.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- newsletter/index.html sitemap.xml; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add newsletter/index.html sitemap.xml
          git commit -m "chore: refresh newsletter + sitemap [skip ci]"
          git push
